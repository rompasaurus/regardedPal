<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Octopus head -->
  <ellipse cx="12" cy="9" rx="7" ry="6.5"/>
  <!-- Eyes (white sockets) -->
  <circle cx="9" cy="9" r="2" fill="white"/>
  <circle cx="15" cy="9" r="2" fill="white"/>
  <!-- Pupils -->
  <circle cx="9.5" cy="9.3" r="0.9"/>
  <circle cx="15.5" cy="9.3" r="0.9"/>
  <!-- Eye highlights -->
  <circle cx="8.3" cy="8.2" r="0.4" fill="white"/>
  <circle cx="14.3" cy="8.2" r="0.4" fill="white"/>
  <!-- Smirk mouth -->
  <path d="M9.5 12.5 Q12 14.5 15 12" stroke="white" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  <!-- Tentacles -->
  <path d="M5.5 14 Q4 17 5 19.5" stroke-width="1.3" stroke-linecap="round" fill="none" stroke="currentColor"/>
  <path d="M7.5 15 Q6 18 7.5 21" stroke-width="1.3" stroke-linecap="round" fill="none" stroke="currentColor"/>
  <path d="M10 15.5 Q9 19 10.5 22" stroke-width="1.3" stroke-linecap="round" fill="none" stroke="currentColor"/>
  <path d="M12 15.5 Q12 19 12 22" stroke-width="1.3" stroke-linecap="round" fill="none" stroke="currentColor"/>
  <path d="M14 15.5 Q15 19 13.5 22" stroke-width="1.3" stroke-linecap="round" fill="none" stroke="currentColor"/>
  <path d="M16.5 15 Q18 18 16.5 21" stroke-width="1.3" stroke-linecap="round" fill="none" stroke="currentColor"/>
  <path d="M18.5 14 Q20 17 19 19.5" stroke-width="1.3" stroke-linecap="round" fill="none" stroke="currentColor"/>
</svg>
