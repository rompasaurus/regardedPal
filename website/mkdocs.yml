site_name: Dilder
site_url: https://dilder.dev
site_description: An open-source AI-assisted virtual pet built with a Raspberry Pi Pico W, e-ink display, and 3D-printed case. Follow the build in real time.
site_author: rompasaurus
repo_url: https://github.com/rompasaurus/dilder
repo_name: rompasaurus/dilder
edit_uri: edit/main/website/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  logo: assets/images/dilder-icon.svg
  favicon: assets/images/dilder-icon.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - blog:
      blog_dir: blog
      post_url_format: "{slug}"
      post_date_format: long
      archive: true
      archive_name: Archive
      categories: true
      categories_name: Categories
      pagination: true
      pagination_per_page: 10

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rompasaurus/dilder
      name: GitHub
    - icon: fontawesome/brands/discord
      link: https://discord.gg/PLACEHOLDER
      name: Discord
    - icon: fontawesome/brands/patreon
      link: https://patreon.com/MchenrysDevelopment
      name: Patreon
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@rompasaurus
      name: YouTube
  analytics:
    provider: google
    property: G-PLACEHOLDER

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/octopus-banner.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Blog:
      - blog/index.md
  - Docs:
      - Overview: docs/index.md
      - Hardware:
          - Materials List: docs/hardware/materials-list.md
          - Wiring & Pinout: docs/hardware/wiring-pinout.md
          - Joystick Wiring: docs/hardware/joystick-wiring.md
          - Battery Wiring: docs/hardware/battery-wiring.md
          - Enclosure Design: docs/hardware/enclosure-design.md
          - Design Evolution: docs/hardware/design-evolution.md
          - ESP32-S3 Enclosure (SCAD): docs/hardware/esp32s3-enclosure-scad.md
          - FreeCAD Mk2 Macro: docs/hardware/freecad-mk2-macro.md
          - FreeCAD Mk2 Design: docs/hardware/freecad-mk2-design.md
          - 3D Printing Pipeline: docs/hardware/3d-printing-pipeline.md
      - Setup:
          - First-Time Setup (C SDK): docs/setup/first-time-setup.md
          - Pico W Setup: docs/setup/pi-zero-setup.md
          - Display Setup: docs/setup/display-setup.md
          - Dev Environment: docs/setup/dev-environment.md
      - Design:
          - KiCad Schematic & PCB Guide: docs/design/kicad-schematic-pcb-guide.md
          - "User Guide: How to Play": docs/design/user-guide.md
          - User Engagement Plan: docs/design/user-engagement-plan.md
          - Custom PCB Design Research: docs/design/custom-pcb-design-research.md
          - Board Design v0.4: docs/design/board-design.md
          - PCB Assembly & Prototyping: docs/design/pcb-assembly-and-prototyping.md
          - Open-Source Board Designs: docs/design/open-board-designs.md
          - Breadboard Prototype: docs/design/breadboard-prototype.md
          - Motion & Location Detection: docs/design/motion-location-detection.md
      - Software:
          - Project Structure: docs/software/project-structure.md
          - Firmware Game Engine: docs/software/firmware-engine.md
          - ESP32-S3 Firmware: docs/software/esp32-firmware.md
          - Emotion States: docs/software/emotion-states.md
      - Tools:
          - DevTool (GUI): docs/tools/devtool.md
          - Setup CLI: docs/tools/setup-cli.md
          - Website Dev CLI: docs/tools/website-dev.md
          - Build & Render Tool: docs/tools/build-render-tool.md
      - Reference:
          - Pico W: docs/reference/pico-w.md
          - Pico 2 W: docs/reference/pico-2-w.md
          - Pi Zero WH (future): docs/reference/pi-zero-wh.md
          - Waveshare e-Paper HAT: docs/reference/waveshare-eink.md
          - ESP32-S3 WROOM-1: docs/reference/esp32-s3-wroom1.md
  - Community:
      - Overview: community/index.md
      - Discord: community/discord.md
      - Support on Patreon: community/support.md
  - About:
      - About Dilder: about/index.md
      - Contact: about/contact.md
  - Prompt Log: prompts/index.md
