<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Subtle noise texture for plastic feel -->
    <filter id="plastic">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <!-- Shadow for depth -->
    <filter id="shadow">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <!-- Button press shadow -->
    <filter id="btnShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.4"/>
    </filter>
    <!-- Inner shadow for display recess -->
    <filter id="inset">
      <feComponentTransfer in="SourceAlpha">
        <feFuncA type="table" tableValues="1 0"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="3"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.5" result="color"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode/>
      </feMerge>
    </filter>
    <!-- Gradient for case body -->
    <linearGradient id="caseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <!-- Gradient for case edge/bevel -->
    <linearGradient id="bevelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <!-- Button gradient -->
    <radialGradient id="btnGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#404040"/>
      <stop offset="100%" stop-color="#252525"/>
    </radialGradient>
    <!-- Center button gradient -->
    <radialGradient id="centerBtnGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4a7c4a"/>
      <stop offset="100%" stop-color="#2d5a2d"/>
    </radialGradient>
    <!-- E-ink screen gradient (slight warm white) -->
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e4d8"/>
      <stop offset="100%" stop-color="#e0dcd0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#f5f5f0"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#333">RegardedPal — Prototype Concept v1</text>
  <text x="600" y="70" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#888">Pi Zero WH + Waveshare 2.13" e-Paper HAT V4 + 5 tactile buttons | Scale: ~2:1</text>

  <!-- ==================== FRONT VIEW ==================== -->
  <text x="310" y="110" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#555">FRONT VIEW</text>

  <!-- Case body - front -->
  <g filter="url(#shadow)">
    <!-- Main case body: 90mm x 42mm at 2:1 scale = 360px x 168px, rounded like iPod Nano -->
    <rect x="130" y="130" width="360" height="168" rx="16" ry="16" fill="url(#caseGrad)" filter="url(#plastic)"/>
    <!-- Subtle edge bevel -->
    <rect x="132" y="132" width="356" height="164" rx="14" ry="14" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Display recess/bezel area -->
  <rect x="152" y="150" width="160" height="128" rx="4" ry="4" fill="#0a0a0a" filter="url(#inset)"/>

  <!-- E-ink screen: 250x122px display, shown at scale -->
  <!-- Active area ~48.55mm x 23.71mm, at 2:1 = 97px x 47px... but let's make it visible -->
  <!-- Showing the full display board area with active screen inside -->
  <rect x="156" y="154" width="152" height="120" rx="2" ry="2" fill="url(#screenGrad)"/>

  <!-- Placeholder pet sprite on e-ink display -->
  <!-- Simple pixel-art style cat face for the placeholder -->
  <g transform="translate(190, 175)">
    <!-- Pet body -->
    <rect x="20" y="30" width="44" height="35" rx="4" fill="#1a1a1a"/>
    <!-- Head -->
    <rect x="16" y="5" width="52" height="32" rx="6" fill="#1a1a1a"/>
    <!-- Left ear -->
    <polygon points="18,8 10,-5 28,5" fill="#1a1a1a"/>
    <!-- Right ear -->
    <polygon points="66,8 74,-5 56,5" fill="#1a1a1a"/>
    <!-- Left eye -->
    <rect x="26" y="15" width="8" height="8" rx="1" fill="#e0dcd0"/>
    <rect x="28" y="17" width="4" height="4" fill="#1a1a1a"/>
    <!-- Right eye -->
    <rect x="50" y="15" width="8" height="8" rx="1" fill="#e0dcd0"/>
    <rect x="52" y="17" width="4" height="4" fill="#1a1a1a"/>
    <!-- Nose -->
    <rect x="39" y="26" width="6" height="4" rx="1" fill="#e0dcd0"/>
    <!-- Mouth -->
    <path d="M36,32 Q42,38 48,32" stroke="#e0dcd0" stroke-width="1.5" fill="none"/>
    <!-- Left paw -->
    <rect x="22" y="58" width="12" height="8" rx="3" fill="#1a1a1a"/>
    <!-- Right paw -->
    <rect x="50" y="58" width="12" height="8" rx="3" fill="#1a1a1a"/>
    <!-- Tail -->
    <path d="M62,55 Q78,45 72,30" stroke="#1a1a1a" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Status bar on e-ink -->
  <line x1="160" y1="266" x2="304" y2="266" stroke="#1a1a1a" stroke-width="0.5" opacity="0.5"/>
  <text x="164" y="262" font-family="monospace" font-size="7" fill="#1a1a1a">HP:100</text>
  <text x="200" y="262" font-family="monospace" font-size="7" fill="#1a1a1a">FD:80</text>
  <text x="232" y="262" font-family="monospace" font-size="7" fill="#1a1a1a">JY:90</text>
  <text x="270" y="262" font-family="monospace" font-size="7" fill="#1a1a1a">ZZ:70</text>

  <!-- Pixel art hearts for HP -->
  <!-- Status icons row at top -->
  <text x="164" y="168" font-family="monospace" font-size="8" fill="#1a1a1a">RegardedPal</text>

  <!-- D-pad button cluster on right side -->
  <!-- Center of button cluster at x=400, y=214 -->

  <!-- Up button -->
  <g filter="url(#btnShadow)">
    <circle cx="400" cy="172" r="14" fill="url(#btnGrad)" stroke="#1a1a1a" stroke-width="1"/>
    <polygon points="400,164 393,178 407,178" fill="#666"/>
  </g>

  <!-- Down button -->
  <g filter="url(#btnShadow)">
    <circle cx="400" cy="256" r="14" fill="url(#btnGrad)" stroke="#1a1a1a" stroke-width="1"/>
    <polygon points="400,264 393,250 407,250" fill="#666"/>
  </g>

  <!-- Left button -->
  <g filter="url(#btnShadow)">
    <circle cx="358" cy="214" r="14" fill="url(#btnGrad)" stroke="#1a1a1a" stroke-width="1"/>
    <polygon points="350,214 364,207 364,221" fill="#666"/>
  </g>

  <!-- Right button -->
  <g filter="url(#btnShadow)">
    <circle cx="442" cy="214" r="14" fill="url(#btnGrad)" stroke="#1a1a1a" stroke-width="1"/>
    <polygon points="450,214 436,207 436,221" fill="#666"/>
  </g>

  <!-- Center/Select button (slightly larger, accent color) -->
  <g filter="url(#btnShadow)">
    <circle cx="400" cy="214" r="16" fill="url(#centerBtnGrad)" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="400" cy="214" r="6" fill="none" stroke="#6aaa6a" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- USB port on bottom edge -->
  <rect x="270" y="296" width="18" height="4" rx="1" ry="1" fill="#0a0a0a" stroke="#333" stroke-width="0.5"/>
  <text x="279" y="310" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#999">USB</text>

  <!-- SD card slot on left edge -->
  <rect x="126" y="230" width="4" height="14" rx="1" ry="1" fill="#0a0a0a" stroke="#333" stroke-width="0.5"/>

  <!-- Labels for front view -->
  <text x="232" y="340" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#999">2.13" e-ink</text>
  <text x="232" y="352" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#999">250 x 122 px</text>
  <text x="400" y="340" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#999">D-pad + Select</text>
  <text x="400" y="352" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#999">5x 6mm tactile</text>

  <!-- ==================== SIDE VIEW ==================== -->
  <text x="750" y="110" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#555">SIDE VIEW (Right)</text>

  <g filter="url(#shadow)">
    <!-- Side profile: 42mm tall x ~18mm deep at 2:1 = 168 x 36 -->
    <rect x="710" y="130" width="36" height="168" rx="6" ry="6" fill="url(#caseGrad)" filter="url(#plastic)"/>
    <!-- Top shell line -->
    <line x1="710" y1="214" x2="746" y2="214" stroke="#333" stroke-width="0.5" stroke-dasharray="2,2"/>
  </g>

  <!-- Button bumps on the right side profile -->
  <circle cx="748" cy="172" r="4" fill="#333" stroke="#444" stroke-width="0.5"/>
  <circle cx="748" cy="214" r="5" fill="#2d5a2d" stroke="#444" stroke-width="0.5"/>
  <circle cx="748" cy="256" r="4" fill="#333" stroke="#444" stroke-width="0.5"/>

  <!-- Side labels -->
  <text x="728" y="340" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#999">~18mm deep</text>
  <line x1="705" y1="130" x2="705" y2="298" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="700" y1="130" x2="705" y2="130" stroke="#bbb" stroke-width="0.5"/>
  <line x1="700" y1="298" x2="705" y2="298" stroke="#bbb" stroke-width="0.5"/>
  <text x="698" y="218" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#bbb">42mm</text>

  <!-- ==================== TOP VIEW ==================== -->
  <text x="1000" y="110" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#555">TOP VIEW</text>

  <g filter="url(#shadow)">
    <!-- Top-down: 90mm wide x 18mm deep at 2:1 = 360 x 36 -->
    <rect x="820" y="160" width="360" height="36" rx="6" ry="6" fill="url(#caseGrad)" filter="url(#plastic)"/>
    <!-- Shell seam -->
    <line x1="820" y1="178" x2="1180" y2="178" stroke="#333" stroke-width="0.5" stroke-dasharray="2,2"/>
  </g>

  <!-- Top dimension label -->
  <line x1="820" y1="210" x2="1180" y2="210" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="820" y1="206" x2="820" y2="214" stroke="#bbb" stroke-width="0.5"/>
  <line x1="1180" y1="206" x2="1180" y2="214" stroke="#bbb" stroke-width="0.5"/>
  <text x="1000" y="224" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#bbb">~90mm</text>

  <!-- ==================== EXPLODED / INTERNAL VIEW ==================== -->
  <text x="400" y="410" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#555">INTERNAL LAYOUT (Exploded)</text>

  <!-- Top shell -->
  <g transform="translate(60, 430)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="168" rx="14" ry="14" fill="#2a2a2a" opacity="0.4" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="180" y="18" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#aaa">TOP SHELL</text>
    <!-- Display window cutout -->
    <rect x="22" y="28" width="156" height="124" rx="3" ry="3" fill="none" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="100" y="95" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#ff6b6b">Display cutout</text>
    <!-- Button holes -->
    <circle cx="270" cy="52" r="8" fill="none" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="270" cy="136" r="8" fill="none" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="228" cy="94" r="8" fill="none" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="312" cy="94" r="8" fill="none" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="270" cy="94" r="10" fill="none" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="270" y="160" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#ff6b6b">Button holes (x5)</text>
  </g>

  <!-- Arrow -->
  <text x="440" y="520" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#999">--></text>

  <!-- Internal component layout -->
  <g transform="translate(480, 430)">
    <!-- Outline -->
    <rect x="0" y="0" width="360" height="168" rx="14" ry="14" fill="none" stroke="#555" stroke-width="1"/>

    <!-- Pi Zero board -->
    <rect x="10" y="10" width="130" height="60" rx="2" ry="2" fill="#1a7a1a" opacity="0.7" stroke="#0d4d0d" stroke-width="1"/>
    <text x="75" y="35" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Pi Zero WH</text>
    <text x="75" y="47" text-anchor="middle" font-family="monospace" font-size="7" fill="#cfc">65 x 30mm</text>
    <!-- GPIO header -->
    <rect x="12" y="12" width="4" height="56" fill="#ffd700" opacity="0.8"/>
    <text x="22" y="62" font-family="monospace" font-size="6" fill="#ffd700">GPIO</text>

    <!-- E-Paper HAT (stacked on Pi) -->
    <rect x="10" y="78" width="130" height="60" rx="2" ry="2" fill="#1a1a7a" opacity="0.6" stroke="#0d0d5d" stroke-width="1"/>
    <text x="75" y="103" text-anchor="middle" font-family="monospace" font-size="9" fill="white">e-Paper HAT V4</text>
    <text x="75" y="115" text-anchor="middle" font-family="monospace" font-size="7" fill="#aaf">65 x 30mm</text>
    <!-- Display active area -->
    <rect x="24" y="84" width="100" height="48" rx="1" ry="1" fill="none" stroke="#e8e4d8" stroke-width="1" stroke-dasharray="2,1"/>
    <text x="74" y="130" font-family="monospace" font-size="6" fill="#88f">active: 48.5x23.7mm</text>

    <!-- Stacking arrow -->
    <line x1="148" y1="70" x2="148" y2="78" stroke="#aaa" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="155" y="76" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="#aaa">stacked</text>

    <!-- Button PCB / perfboard area -->
    <rect x="180" y="20" width="100" height="130" rx="2" ry="2" fill="#7a5a1a" opacity="0.4" stroke="#a07020" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="230" y="42" text-anchor="middle" font-family="monospace" font-size="8" fill="#daa520">Perfboard</text>
    <text x="230" y="54" text-anchor="middle" font-family="monospace" font-size="7" fill="#daa520">or custom PCB</text>

    <!-- Button positions on perfboard -->
    <circle cx="230" cy="72" r="6" fill="#444" stroke="#666" stroke-width="1"/>
    <text x="248" y="75" font-family="monospace" font-size="6" fill="#999">UP</text>
    <circle cx="230" cy="128" r="6" fill="#444" stroke="#666" stroke-width="1"/>
    <text x="248" y="131" font-family="monospace" font-size="6" fill="#999">DN</text>
    <circle cx="208" cy="100" r="6" fill="#444" stroke="#666" stroke-width="1"/>
    <text x="195" y="95" text-anchor="end" font-family="monospace" font-size="6" fill="#999">LT</text>
    <circle cx="252" cy="100" r="6" fill="#444" stroke="#666" stroke-width="1"/>
    <text x="265" y="103" font-family="monospace" font-size="6" fill="#999">RT</text>
    <circle cx="230" cy="100" r="7" fill="#2d5a2d" stroke="#666" stroke-width="1"/>
    <text x="230" y="115" text-anchor="middle" font-family="monospace" font-size="6" fill="#6a6">SEL</text>

    <!-- Wire runs from perfboard to GPIO -->
    <path d="M180,80 Q160,70 142,55" stroke="#ff6b6b" stroke-width="0.8" fill="none" stroke-dasharray="2,2"/>
    <path d="M180,100 Q160,90 142,45" stroke="#ff9b3b" stroke-width="0.8" fill="none" stroke-dasharray="2,2"/>
    <path d="M180,120 Q160,100 142,35" stroke="#6b6bff" stroke-width="0.8" fill="none" stroke-dasharray="2,2"/>
    <text x="160" y="148" font-family="monospace" font-size="6" fill="#999">GPIO wires</text>

    <!-- Battery space (future) -->
    <rect x="290" y="20" width="60" height="130" rx="2" ry="2" fill="#333" opacity="0.3" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="320" y="80" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#888">Future</text>
    <text x="320" y="92" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#888">LiPo</text>
    <text x="320" y="104" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#888">Battery</text>
  </g>

  <!-- ==================== DIMENSIONS CALLOUT ==================== -->
  <g transform="translate(60, 640)">
    <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#555">Dimensions (estimated)</text>
    <text x="0" y="22" font-family="monospace" font-size="11" fill="#777">Case outer:  ~90mm x 42mm x 18mm</text>
    <text x="0" y="38" font-family="monospace" font-size="11" fill="#777">Display window:  ~52mm x 26mm</text>
    <text x="0" y="54" font-family="monospace" font-size="11" fill="#777">Button spacing:  ~14mm center-to-center</text>
    <text x="0" y="70" font-family="monospace" font-size="11" fill="#777">Wall thickness:  ~2mm</text>
    <text x="0" y="86" font-family="monospace" font-size="11" fill="#777">Corner radius:  ~8mm</text>
    <text x="0" y="102" font-family="monospace" font-size="11" fill="#777">Assembly:  2-piece snap-fit + 4x M2 screws</text>
  </g>

  <!-- ==================== HARDWARE KEY ==================== -->
  <g transform="translate(520, 640)">
    <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#555">Component Key</text>
    <rect x="0" y="10" width="14" height="14" rx="1" fill="#1a7a1a" opacity="0.7"/>
    <text x="20" y="22" font-family="monospace" font-size="10" fill="#777">Raspberry Pi Zero WH (65x30mm)</text>
    <rect x="0" y="30" width="14" height="14" rx="1" fill="#1a1a7a" opacity="0.6"/>
    <text x="20" y="42" font-family="monospace" font-size="10" fill="#777">Waveshare 2.13" e-Paper HAT V4 (65x30mm)</text>
    <rect x="0" y="50" width="14" height="14" rx="1" fill="#7a5a1a" opacity="0.4"/>
    <text x="20" y="62" font-family="monospace" font-size="10" fill="#777">Button perfboard / custom PCB</text>
    <circle cx="7" cy="77" r="6" fill="#444" stroke="#666" stroke-width="1"/>
    <text x="20" y="80" font-family="monospace" font-size="10" fill="#777">6x6mm tactile button (x4 directional)</text>
    <circle cx="7" cy="97" r="6" fill="#2d5a2d" stroke="#666" stroke-width="1"/>
    <text x="20" y="100" font-family="monospace" font-size="10" fill="#777">6x6mm tactile button (center/select)</text>
    <rect x="0" y="108" width="14" height="14" rx="1" fill="#333" opacity="0.3" stroke="#666" stroke-width="0.5"/>
    <text x="20" y="120" font-family="monospace" font-size="10" fill="#777">Future battery compartment</text>
  </g>
</svg>