[pytest]
testpaths = devtool setup_cli website
addopts =
    -v
    --tb=short
    --timeout=120
    --html=reports/report.html
    --self-contained-html
markers =
    screenshot: tests that capture screenshots for user guides
    slow: tests that take more than 10 seconds
    hardware: tests requiring physical hardware (skipped by default)
    website: tests requiring MkDocs dev server
